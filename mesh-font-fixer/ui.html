<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Inter, sans-serif; }
    body { background: #fff; padding: 20px; }
    h2 { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 4px; }
    p  { font-size: 11px; color: #666; margin-bottom: 16px; line-height: 1.5; }
    button {
      width: 100%;
      height: 36px;
      background: #9F2089;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #7A1870; }
    button:disabled { background: #ccc; cursor: default; }
    #status {
      margin-top: 12px;
      font-size: 11px;
      color: #333;
      min-height: 16px;
      text-align: center;
    }
    #status.error { color: #E11900; }
    #status.done  { color: #038D63; font-weight: 600; }
  </style>
</head>
<body>
  <h2>MESH Font Fixer</h2>
  <p>Replaces all DM Sans placeholder text with the correct Mier B02 weights across every page in this file.</p>
  <button id="btn" onclick="run()">Fix Fonts → Mier B02</button>
  <div id="status"></div>

  <script>
    const btn    = document.getElementById('btn');
    const status = document.getElementById('status');

    function run() {
      btn.disabled = true;
      status.className = '';
      status.textContent = 'Running…';
      parent.postMessage({ pluginMessage: { type: 'run' } }, '*');
    }

    window.onmessage = e => {
      const msg = e.data.pluginMessage;
      if (!msg) return;
      status.textContent = msg.text;
      if (msg.type === 'done')  { status.className = 'done';  btn.disabled = false; }
      if (msg.type === 'error') { status.className = 'error'; btn.disabled = false; }
      if (msg.type === 'status') { status.textContent = msg.text; }
    };
  </script>
</body>
</html>
